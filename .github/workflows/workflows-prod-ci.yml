name: TerraformEC2Provisioner - PROD CI

on:
  pull_request:
    branches:
      - main

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_myip: ${{ secrets.MY_IP_CIDR }}
  TF_VAR_ami_id: ${{ secrets.PROD_AMI_ID }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Format Check
        working-directory: environments/prod
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: environments/prod
        run: terraform init -upgrade

      - name: Terraform Validate
        working-directory: environments/prod
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: environments/prod
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('environments/prod/plan_output.txt', 'utf8');
            const truncated = plan.length > 65000
              ? plan.substring(0, 65000) + '\n...(output truncado)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan — PROD\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Falha se o plan teve erro
        if: steps.plan.outcome == 'failure'
        run: exit 1
